version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: booknest-frontend
    ports:
      - "3000:80"
    environment:
      - API_GATEWAY_URL=http://api-gateway:8080
    restart: unless-stopped
    # If your backend services are on a specific Docker network, 
    # you can connect the frontend to the same network here:
    # networks:
    #   - booknest_network

# networks:
#   booknest_network:
#     external: true
